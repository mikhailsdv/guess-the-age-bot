services:
    app:
        restart: unless-stopped
        depends_on:
            - database
        build:
            context: .
        env_file:
            - .env
        environment:
            NODE_ENV: production

    database:
        restart: unless-stopped
        image: mongo:6
        volumes:
            - database:/data/db
        ports:
            - 127.0.0.1:${MONGO_EXTERNAL_PORT}:27017

volumes:
    database:
